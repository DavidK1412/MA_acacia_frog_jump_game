micronaut:
  application:
    name: fj-middleend-api
  serde:
    property-naming-strategy: SNAKE_CASE
    serialization:
      indent-output: true

jackson:
  property-naming-strategy: SNAKE_CASE
  serialization:
    indentation: true

datasources:
  default:
    url: jdbc:h2:mem:frogjumpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
    dialect: H2

jpa:
  default:
    entity-scan:
      packages: 'com.acacia.infrastructure.persistence.entity'
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: true
        format_sql: true